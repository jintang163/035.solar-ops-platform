server:
  port: 8083
  servlet:
    context-path: /workorder

spring:
  application:
    name: solar-ops-workorder

  elasticsearch:
    uris: http://127.0.0.1:9200
    username:
    password:
    connection-timeout: 5s
    socket-timeout: 30s

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/solar_ops?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: workorder-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  consumer:
    group: workorder-consumer-group

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.solar.ops.workorder.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: 故障工单管理系统 API
    description: 光伏电站故障工单管理接口文档
    version: 1.0.0
    concat: solar-ops
    group:
      default:
        group-name: 默认
        api-rule: package
        api-rule-resources:
          - com.solar.ops.workorder.controller

logging:
  level:
    com.solar.ops.workorder: debug
    org.springframework: info
    org.springframework.data.elasticsearch: debug
