server:
  port: 8080
  servlet:
    context-path: /admin

spring:
  application:
    name: solar-ops-admin

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/solar_ops?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.solar.ops.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: 光伏电站运维平台管理后台API
    description: 光伏电站运维平台管理后台接口文档
    version: 1.0.0
    concat: admin@solar.com
    terms-of-service-url: http://www.solar-ops.com
    group:
      default:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.solar.ops.admin.controller

jwt:
  secret: solar-ops-platform-secret-key-2024
  expiration: 86400000
  token-prefix: Bearer
  header: Authorization
