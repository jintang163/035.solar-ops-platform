server:
  port: 8080
  servlet:
    context-path: /admin

spring:
  application:
    name: solar-ops-admin

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/solar_ops?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.solar.ops.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: 光伏电站运维平台管理后台API
    description: 光伏电站运维平台管理后台接口文档
    version: 1.0.0
    concat: admin@solar.com
    terms-of-service-url: http://www.solar-ops.com
    group:
      default:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.solar.ops.admin.controller

jwt:
  secret: solar-ops-platform-secret-key-2024
  expiration: 86400000
  token-prefix: Bearer
  header: Authorization

influxdb:
  url: http://localhost:8086
  username: admin
  password: admin
  database: solar_ops
  retention-policy: autogen
  connect-timeout: 10
  read-timeout: 30
  write-timeout: 10

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: admin-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: admin-consumer-group
    voice-broadcast:
      topic: fault-alarm-topic
      group: voice-broadcast-consumer-group

voice:
  tts:
    enabled: false
    provider: xunfei
    xunfei-app-id:
    xunfei-api-key:
    xunfei-api-secret:
    xunfei-voice-name: xiaoyan
    xunfei-speed: 50
    xunfei-volume: 50
    audio-save-path: /data/voice-broadcast/audio
    audio-base-url: http://localhost:8080/admin/voice-broadcast/audio
  speaker:
    enabled: false
    api-url: http://192.168.1.100:8080/api/speaker/broadcast
    api-key:
    device-ids:
      - speaker-001
      - speaker-002
    timeout: 10
    push-method: http
    mqtt-broker: tcp://localhost:1883
    mqtt-topic: solar/speaker/broadcast

grid:
  dispatch:
    enabled: true
    default-protocol: IEC104
    upload-interval: 5
    command-timeout: 60
    max-retry-count: 3
    redis-cache-key: "grid:dispatch:cache:"
    redis-cache-ttl: 3600
    alarm-on-fail: true
