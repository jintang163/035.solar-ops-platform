server:
  port: 8082
  servlet:
    context-path: /analysis

spring:
  application:
    name: solar-ops-analysis

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/solar_ops?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  quartz:
    scheduler-name: analysisScheduler
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: analysisScheduler
            instanceId: AUTO
          jobStore:
            class: org.quartz.simpl.RAMJobStore
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

  mail:
    host: smtp.qq.com
    port: 465
    username: noreply@solar.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true

influxdb:
  url: http://localhost:8086
  username: admin
  password: admin
  database: solar_data
  retention-policy: autogen
  connect-timeout: 10
  read-timeout: 30
  write-timeout: 10

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.solar.ops.analysis.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: 发电效率分析模块API
    description: 光伏电站发电效率分析模块接口文档
    email: support@solar.com
    concat: solar-ops
    version: 1.0.0
    terms-of-service-url: http://www.solar.com

warranty:
  reminder:
    days: 30
